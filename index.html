<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Visualiseur 3D</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #f5f5f5;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<model-viewer
  src="model.glb"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  exposure="1"
  alt="Modèle 3D">
</model-viewer>

</body>
</html>
